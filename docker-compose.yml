services:
  ingestor:
    build: .
    command: python scheduler.py
    env_file:
      - path: .env
        required: false
    volumes:
      - datalake:/app/datalake
    restart: always
  web:
    build: .
    command: >
      streamlit run .\app\streamlit_app.py
      --server.port 8501 --server.address 0.0.0.0 --server.headless true
    environment:
      DATALAKE_DIR: /app/datalake
    env_file:
      - path: .env
        required: false
    volumes:
      - datalake:/app/datalake
    expose:
      - "8501"
    depends_on:
      - ingestor
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
volumes:
  datalake:
